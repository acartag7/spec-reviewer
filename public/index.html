<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spec Reviewer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Spec Reviewer</div>
      <form id="open-form" class="path-form">
        <input id="path-input" name="path" placeholder="~/project/.../README.md" autocomplete="off">
        <button type="submit">Open file</button>
      </form>
      <button id="export-button" type="button">Copy feedback</button>
    </header>

    <section id="start-screen" class="start-screen" hidden>
      <div id="drop-zone" class="drop-zone">
        <div class="start-title">Review a Markdown spec</div>
        <div class="start-copy">Drop a `.md` file here or paste a local path.</div>
        <form id="start-path-form" class="start-path-form">
          <input id="start-path-input" placeholder="~/project/.../README.md" autocomplete="off">
          <button type="submit">Open path</button>
        </form>
        <label class="file-pick">
          Choose Markdown file
          <input id="file-input" type="file" accept=".md,.markdown" hidden>
        </label>
      </div>
      <section class="recent">
        <div class="panel-title">Recent Reviews</div>
        <div id="recent-list" class="recent-list"></div>
      </section>
    </section>

    <main class="workspace">
      <section class="reader">
        <div class="reader-head">
          <div>
            <div id="doc-title" class="title">No document open</div>
            <div id="doc-meta" class="meta">Open a Markdown file to start.</div>
          </div>
          <div id="counts" class="counts"></div>
        </div>
        <div id="state-banner" class="state-banner" hidden></div>
        <div id="document-lines" class="lines"></div>
      </section>

      <aside class="panel">
        <section class="panel-block">
          <div class="panel-title">Annotation</div>
          <form id="annotation-form" class="annotation-form">
            <div class="row">
              <label>Lines <input id="line-start" type="number" min="1"></label>
              <label>to <input id="line-end" type="number" min="1"></label>
            </div>
            <input id="severity" type="hidden" value="major">
            <input id="kind" type="hidden" value="issue">
            <div>
              <div class="field-label">Severity</div>
              <div class="segmented" data-field="severity">
                <button type="button" data-value="major">Major</button>
                <button type="button" data-value="blocker">Blocker</button>
                <button type="button" data-value="minor">Minor</button>
                <button type="button" data-value="note">Note</button>
              </div>
            </div>
            <div>
              <div class="field-label">Kind</div>
              <div class="segmented" data-field="kind">
                <button type="button" data-value="issue">Issue</button>
                <button type="button" data-value="suggestion">Suggestion</button>
                <button type="button" data-value="question">Question</button>
                <button type="button" data-value="decision">Decision</button>
                <button type="button" data-value="note">Note</button>
              </div>
            </div>
            <label>Selected text <textarea id="selected-text" rows="2"></textarea></label>
            <label>Feedback <textarea id="note" rows="5" required></textarea></label>
            <div class="actions">
              <button id="reset-form" type="button">Clear</button>
              <button type="submit">Add note</button>
            </div>
          </form>
        </section>

        <section class="panel-block">
          <div class="panel-title">Open Notes</div>
          <div id="annotation-list" class="annotation-list"></div>
        </section>

        <section class="panel-block">
          <div class="panel-title">Agent Export</div>
          <textarea id="export-output" rows="12" readonly></textarea>
          <div class="actions">
            <button id="copy-export" type="button">Copy</button>
          </div>
        </section>
      </aside>
    </main>

    <div id="status" class="status" role="status"></div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
